{% extends "base.html" %}

{% block title %}Admin Login | Varnam Aesthetics{% endblock %}

{% block content %}
<div
    style="max-width: 400px; margin: 60px auto; padding: 40px 30px; background-color: var(--color-white); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); border-top: 4px solid var(--color-maroon);">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--color-maroon);">Admin Portal</h2>

    <form action="{{ url_for('admin.login') }}" method="POST">
        <div class="form-group">
            <label for="email">Admin Email</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
    </form>
</div>
{% endblock %}
