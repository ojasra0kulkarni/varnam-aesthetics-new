{% extends "base.html" %}

{% block title %}Your Cart | Varnam Aesthetics{% endblock %}

{% block content %}
<h1 style="text-align: center; margin-bottom: 30px;">Your Cart</h1>
<div class="ornament-separator" style="margin-bottom: 40px;">❀</div>

<div id="cart-container" class="cart-container">
    <!-- Cart items will be rendered here via JS -->
    <div id="empty-cart-msg" class="cart-empty" style="display: none;">
        <div class="cart-empty-icon">🛒</div>
        <p>Your cart is beautifully empty.</p>
        <a href="{{ url_for('main.shop') }}" class="btn btn-secondary">Continue Shopping</a>
    </div>

    <div id="cart-items"></div>

    <div id="cart-summary" class="cart-summary" style="display: none;">
        <h3>Total: <span id="cart-total" style="color: var(--color-gold);">₹0.00</span></h3>
        <button id="checkout-btn" class="btn btn-primary cart-checkout-btn">Proceed to Checkout</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const cartContainer = document.getElementById('cart-items');
        const emptyMsg = document.getElementById('empty-cart-msg');
        const cartSummary = document.getElementById('cart-summary');
        const cartTotalSpan = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkout-btn');

        window.renderCartUI = function () {
            const currentCart = JSON.parse(localStorage.getItem('varnam_cart')) || [];

            if (currentCart.length === 0) {
                cartContainer.innerHTML = '';
                emptyMsg.style.display = 'flex';
                cartSummary.style.display = 'none';
                return;
            }

            emptyMsg.style.display = 'none';
            cartSummary.style.display = 'flex';

            let html = '';
            let total = 0;

            currentCart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                let imgHtml;
                if (item.image && item.image.length > 0) {
                    imgHtml = `<img src="${item.image}" alt="${item.name}" class="cart-item-img">`;
                } else {
                    imgHtml = `<div class="cart-item-img cart-item-placeholder"><span>❀</span></div>`;
                }

                html += `
                <div class="cart-item">
                    <div class="cart-item-visual">
                        ${imgHtml}
                    </div>
                    <div class="cart-item-details">
                        <span class="cart-item-name">${item.name}</span>
                        <span class="cart-item-price">₹${item.price.toFixed(2)}</span>
                    </div>
                    <div class="cart-item-controls">
                        <div class="cart-qty-wrapper">
                            <label class="cart-qty-label">Qty</label>
                            <input type="number" min="1" value="${item.quantity}"
                                   onchange="updateQuantity(${item.id}, this.value)"
                                   class="cart-qty-input">
                        </div>
                        <span class="cart-item-total">₹${itemTotal.toFixed(2)}</span>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="cart-item-remove" title="Remove" aria-label="Remove ${item.name}">×</button>
                </div>`;
            });

            cartContainer.innerHTML = html;
            cartTotalSpan.textContent = `₹${total.toFixed(2)}`;
        };

        renderCartUI();

        checkoutBtn.addEventListener('click', () => {
            window.location.href = "{{ url_for('main.checkout') }}";
        });
    });
</script>
{% endblock %}
